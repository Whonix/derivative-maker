## AI-Assisted

## Ansible configuration for the automated_builder pipeline.
##
## Picked up automatically when 'ansible-playbook' is invoked with
## this directory as cwd, or when this directory is on
## ANSIBLE_CONFIG. The two callers
##   automated_builder/scripts/run_automated_builder.sh
##   automated_builder/scripts/handle_artifacts.sh
## both run from the repo root, so we point ANSIBLE_CONFIG at this
## file from those scripts.

[defaults]
## Render task results - especially failures - as multi-line YAML
## instead of the default single-line JSON dump. The default
## callback emits failed stderr as a JSON-encoded string with
## literal '\n' characters; the GitHub Actions log viewer then
## prints those as text rather than as line breaks, collapsing the
## remote shell's xtrace output into one unreadable line. The
## 'yaml' callback is built into ansible-core and produces output
## that the log viewer renders one line per line.
stdout_callback = yaml

## Surface the remote command's stderr as its own block on failure
## (instead of burying it inside the result dict). Reads in
## combination with stdout_callback=yaml.
display_failed_stderr = True

## Apply the same callback to ad-hoc 'ansible' (not just
## 'ansible-playbook') invocations. Cheap consistency win.
bin_ansible_callbacks = True
