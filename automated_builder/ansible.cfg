## AI-Assisted

## Ansible configuration for the automated_builder pipeline.
## Pointed at via ANSIBLE_CONFIG from
## automated_builder/scripts/functions.bash.

[defaults]
## Render task results as multi-line YAML. The default callback
## emits failed stderr as a JSON-encoded single-line string; the
## yaml render format renders one line per line, which the GitHub
## Actions log viewer can display readably.
##
## Historically this was `stdout_callback = yaml`, which routed
## through the `community.general.yaml` callback. That callback
## was removed in `community.general` 12.0.0 (the collection
## emits: "callback plugin has been removed. The plugin has been
## superseded by the option `result_format=yaml` in callback
## plugin ansible.builtin.default from ansible-core 2.13 onwards.
## This feature was removed from collection 'community.general'
## version 12.0.0."). Switch to the supported replacement: the
## built-in default callback with `result_format = yaml`.
stdout_callback = default
result_format = yaml

## Surface the remote command's stderr as its own block on failure
## instead of burying it inside the result dict.
display_failed_stderr = True

## Apply the same callback to ad-hoc 'ansible' invocations.
bin_ansible_callbacks = True

## deprecation_warnings is intentionally left at default (True);
## do not silence - address deprecations as they arise.
