## End-to-end dry-run smoke. Heavyweight (5-15 min). Invoked as a
## reusable workflow from run_automated_builder.yml so the build is
## gated on the dry-run passing in the same Actions UI run; also
## available as workflow_dispatch for ad-hoc manual smoke tests.
##
## See agents/github-actions-security.md for the standard
## permissions / persist-credentials / fork-PR / SHA-pin patterns.

name: Dry-run

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ## debian:trixie - Debian 13, current stable. TODO: forky.
  ## Re-pin procedure: agents/github-actions-security.md.
  DEBIAN_IMAGE: 'debian:trixie@sha256:35b8ff74ead4880f22090b617372daff0ccae742eb5674455d542bef71ef1999'

jobs:
  dry-run:
    name: derivative-maker --dry-run true
    runs-on: ubuntu-latest

    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request'

    timeout-minutes: 25

    ## Steps run inside a privileged debian:trixie with systemd as
    ## PID 1 so 'systemctl start approx' (the build's apt cache)
    ## works. The host (ubuntu-latest) only hosts docker; a plain
    ## 'container:' block does not boot systemd inside.
    steps:
      - name: Checkout repository (no submodules yet)
        ## submodules: false so the next steps can re-target each
        ## submodule's origin URL at the fork before init.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          submodules: false
          fetch-depth: 0
          persist-credentials: false

      - name: Mirror Kicksecure/ and Whonix/ to ${{ github.repository_owner }}
        ## Install --global url.insteadOf rewrites BEFORE submodule
        ## init so cross-org submodule clones go through the fork
        ## from the start. Skipped on the upstream Whonix /
        ## Kicksecure repos (no rewrite needed there).
        if: github.repository_owner != 'Whonix' && github.repository_owner != 'Kicksecure'
        run: ./ci/configure-fork-mirror "${{ github.repository_owner }}" "${{ github.repository_owner }}"

      - name: Initialize submodules
        run: git submodule update --init --recursive

      - name: Check out matching fork branch in cross-org submodules (if present)
        ## Lets a PR on derivative-maker's claude/foo branch test
        ## claude/foo in helper-scripts / developer-meta-files
        ## simultaneously, before those land upstream and get
        ## pinned. Submodules without a matching branch keep the
        ## SHA pin from the parent's index.
        ##
        ## github.head_ref / github.ref_name go through an env var
        ## (not inlined) per actionlint: head_ref on a fork PR is
        ## attacker-named.
        if: github.repository_owner != 'Whonix' && github.repository_owner != 'Kicksecure'
        env:
          FORK_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: ./ci/checkout-fork-submodule-branches "${FORK_BRANCH}"

      - name: Start systemd-enabled Debian container
        run: ./docker/dry-run-start-container dryrun "${DEBIAN_IMAGE}"

      - name: Run dry-run inside container
        ## docker-execs into ./ci/dry-run, which run-parts walks
        ## ci/dry-run.d/ in numeric order. Per-phase failure
        ## surfaces via run-parts --exit-on-error; per-phase
        ## visibility is in the consolidated log.
        run: docker exec --env CI=true dryrun ./ci/dry-run

      - name: Tear down container
        if: always()
        run: docker rm --force dryrun || true
