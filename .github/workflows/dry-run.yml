## End-to-end dry-run smoke. Heavyweight (5-15 min). Invoked as a
## reusable workflow from run_automated_builder.yml so the build is
## gated on the dry-run passing in the same Actions UI run; also
## available as workflow_dispatch for ad-hoc manual smoke tests.
##
## The previous tag-push trigger has been moved to
## run_automated_builder.yml: a single workflow run on tag now does
## (dry-run -> build) instead of two parallel runs that did not
## share success state.
##
## See agents/github-actions-security.md for the standard
## permissions / persist-credentials / fork-PR / SHA-pin patterns.

name: Dry-run

on:
  ## Reusable workflow entrypoint - run_automated_builder.yml's
  ## first job calls this via 'uses: ./.github/workflows/dry-run.yml'.
  workflow_call:
  ## Manual ad-hoc trigger from the Actions tab.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ## debian:trixie - Debian 13, current stable. TODO: update for
  ## forky. Re-pin procedure: agents/github-actions-security.md.
  DEBIAN_IMAGE: 'debian:trixie@sha256:35b8ff74ead4880f22090b617372daff0ccae742eb5674455d542bef71ef1999'

jobs:
  dry-run:
    name: derivative-maker --dry-run true
    runs-on: ubuntu-latest

    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request'

    timeout-minutes: 25

    ## A plain `container:` block runs the steps inside a Docker
    ## exec'd into the image, NOT under systemd as PID 1. derivative-
    ## maker's build_machine_setup expects `systemctl start approx`
    ## to bring up the local apt cache; without systemd as PID 1
    ## that call is a no-op and `apt-get update` against
    ## 127.0.0.1:9977 fails.
    ##
    ## Option C: run a detached, privileged container with
    ## /sbin/init as the entrypoint so systemd boots inside; then
    ## `docker exec` each build step into it. The host runs
    ## ubuntu-latest (which already has systemd, only used to host
    ## the docker daemon).
    steps:
      - name: Checkout repository (no submodules yet)
        ## submodules: false here so submodule init runs in our own
        ## step below, where we can re-target the per-submodule
        ## origin URL at the fork before any fork-side branch
        ## lookup.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          submodules: false
          fetch-depth: 0
          persist-credentials: false

      - name: Mirror Kicksecure/ and Whonix/ to ${{ github.repository_owner }}
        ## On forks (owner != Whonix && != Kicksecure), install
        ## global git url.<fork>.insteadOf rewrites so any subsequent
        ## git operation - parent OR submodule - that targets a
        ## Kicksecure/* or Whonix/* upstream gets routed to the
        ## fork-org mirror instead. Two 'git config --global' lines
        ## in ci/configure-fork-mirror.sh cover every cross-org
        ## submodule the build reaches. Must run BEFORE the submodule
        ## init below so the clones go through the rewrite from the
        ## start. Replayable from a dev clone (writes ~/.gitconfig).
        if: github.repository_owner != 'Whonix' && github.repository_owner != 'Kicksecure'
        run: ./ci/configure-fork-mirror.sh "${{ github.repository_owner }}" "${{ github.repository_owner }}"

      - name: Initialize submodules
        run: git submodule update --init --recursive

      - name: Check out matching fork branch in cross-org submodules (if present)
        ## After the canonical SHA pins are checked out and origins
        ## are pointed at the fork, opportunistically switch each
        ## submodule to the same-named branch on its fork remote
        ## when one exists. Lets a PR on derivative-maker's
        ## claude/foo branch simultaneously test claude/foo in
        ## helper-scripts and developer-meta-files - fork-side fixes
        ## flow into CI before they land upstream and get pinned.
        ## Submodules without a matching fork branch keep their pin.
        ## github.head_ref is set on pull_request triggers (the PR's
        ## source branch); github.ref_name is the branch on push.
        ## github.head_ref / github.ref_name are passed through an env
        ## var rather than inlined into the run: script, per actionlint
        ## guidance: head_ref is attacker-controlled (any forked PR
        ## can name its branch arbitrarily) and inlining it would be
        ## a shell-injection sink. The script's own arg validator
        ## (case statement, alnum + '._/-' only) is the second layer.
        if: github.repository_owner != 'Whonix' && github.repository_owner != 'Kicksecure'
        env:
          FORK_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: ./ci/checkout-fork-submodule-branches.sh "${FORK_BRANCH}"

      - name: Start systemd-enabled Debian container
        run: ./ci/dry-run-start-container.sh dryrun "${DEBIAN_IMAGE}"

      - name: Install git inside container (required by submodule paths)
        run: ./ci/dry-run-install-container-git.sh dryrun

      - name: Install build prerequisites in container
        ## --env CI=true is required: the in-container scripts'
        ## guard clauses refuse to run unless CI=true, and `docker
        ## exec` does not propagate the GHA runner's environment.
        run: docker exec --env CI=true dryrun ./ci/dry-run-install.sh

      - name: Sign HEAD with ephemeral CI key (so git_sanity_test passes)
        ## help-steps/git_sanity_test runs sq-git verification of HEAD
        ## as an unconditional gate even under --dry-run. On a PR build
        ## that gate sees GitHub's auto-merge commit (signed by GitHub
        ## Actions, not by an authorized maintainer key) and fails.
        ## ci/dry-run-sign-and-tag.sh generates an ephemeral OpenPGP
        ## key, builds a CI-only policy that trust-roots it, re-signs
        ## HEAD with it, and prints the policy path on stdout.
        ## ci/dry-run-sign-step.sh is the workflow-side driver:
        ## docker-execs into the container, tees stdout to a log
        ## file, and forwards 'sq_git_policy_file=...' to
        ## $GITHUB_ENV via 'tee --append' (visible in xtrace, unlike
        ## a '>>' redirection).
        run: ./ci/dry-run-sign-step.sh dryrun

      - name: Drop privileges and run derivative-maker --dry-run true
        ## ci/dry-run-build-step.sh wraps the docker exec with the
        ## sq_git_policy_file env-flag composition. sq_git_trust_root
        ## is NOT forwarded: help-steps/variables defaults it to
        ## "HEAD" for non-redistributable builds, which the dry-run
        ## is, so passing it would be redundant.
        run: ./ci/dry-run-build-step.sh dryrun

      - name: Tear down container
        if: always()
        run: docker rm --force dryrun || true

      ## No artifact upload step: --dry-run prints to stdout (captured
      ## by the Actions step log); nothing in help-steps/ or
      ## build-steps.d/ writes a .log file. If a future build step
      ## starts producing one, add the upload step back with the
      ## actual path - don't pre-emptively glob.
