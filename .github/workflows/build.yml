---
name: Build (reusable)

on:
  workflow_call:
    inputs:
      distro:
        required: true
        type: string
      flavor:
        required: true
        type: string
      target:
        required: true
        type: string
      arch:
        required: true
        type: string
      runner:
        required: true
        type: string
      fast_build:
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ${{ inputs.runner }}
    container:
      image: debian:trixie
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Install prerequisites
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            git \
            sudo \
            ca-certificates \
            adduser \
            lsb-release \
            sq \
            procps

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: derivative-maker
          submodules: recursive

      - name: Create build user
        run: |
          useradd -m user
          echo 'user ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/user
          chown -R user:user derivative-maker

      - name: Build Whonix gateway
        if: inputs.distro == 'whonix' && inputs.target != 'iso'
        run: |
          cd derivative-maker
          su user -c './derivative-maker \
            --flavor whonix-gateway-${{ inputs.flavor }} \
            --target ${{ inputs.target }} \
            --type vm \
            --arch ${{ inputs.arch }} \
            --allow-untagged true \
            --allow-uncommitted true \
            ${{ inputs.fast_build && '--repo true --remote-derivative-packages true' || '' }}'

      - name: Build Whonix workstation
        if: inputs.distro == 'whonix' && inputs.target != 'iso'
        run: |
          cd derivative-maker
          su user -c './derivative-maker \
            --flavor whonix-workstation-${{ inputs.flavor }} \
            --target ${{ inputs.target }} \
            --type vm \
            --arch ${{ inputs.arch }} \
            --allow-untagged true \
            --allow-uncommitted true \
            ${{ inputs.fast_build && '--repo true --remote-derivative-packages true' || '' }}'

      - name: Build Kicksecure
        if: inputs.distro == 'kicksecure'
        run: |
          cd derivative-maker
          su user -c './derivative-maker \
            --flavor kicksecure-${{ inputs.flavor }} \
            --target ${{ inputs.target }} \
            --type ${{ inputs.target == 'iso' && 'host' || 'vm' }} \
            --arch ${{ inputs.arch }} \
            --allow-untagged true \
            --allow-uncommitted true \
            ${{ inputs.fast_build && '--repo true --remote-derivative-packages true' || '' }}'

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.distro }}-${{ inputs.flavor }}-${{ inputs.target }}-${{ inputs.arch }}
          path: ~/derivative-binary/
          retention-days: 30
