---
name: Build (reusable)

on:
  workflow_call:
    inputs:
      distro:
        required: true
        type: string
      flavor:
        required: true
        type: string
      target:
        required: true
        type: string
      arch:
        required: true
        type: string
      runner:
        required: true
        type: string
      fast_build:
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ${{ inputs.runner }}
    env:
      DEBIAN_FRONTEND: noninteractive
      CI: true
    steps:

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          path: derivative-maker
          submodules: recursive

      - name: Install build prerequisites
        run: |
          sudo add-apt-repository -y universe

          ## Add Debian Trixie repo for packages not in Noble (gpg-sq, newer sq).
          ## Pin it low so it doesn't override Ubuntu packages by default.
          sudo apt-get install -y --no-install-recommends debian-archive-keyring
          echo "deb [signed-by=/usr/share/keyrings/debian-archive-keyring.gpg] http://deb.debian.org/debian trixie main" \
            | sudo tee /etc/apt/sources.list.d/debian-trixie.list
          printf 'Package: *\nPin: release o=Debian,n=trixie\nPin-Priority: 100\n' \
            | sudo tee /etc/apt/preferences.d/debian-trixie

          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            safe-rm \
            approx \
            fasttrack-archive-keyring
          sudo apt-get install -y --no-install-recommends -t trixie \
            sq \
            gpg-sq

          ## Remove Trixie repo after installing what we need so
          ## derivative-maker's own apt calls don't pull Debian packages.
          sudo rm /etc/apt/sources.list.d/debian-trixie.list /etc/apt/preferences.d/debian-trixie
          sudo apt-get update

      - name: Build Whonix gateway
        if: inputs.distro == 'whonix' && inputs.target != 'iso'
        run: |
          cd derivative-maker
          ./derivative-maker \
            --flavor whonix-gateway-${{ inputs.flavor }} \
            --target ${{ inputs.target }} \
            --type vm \
            --arch ${{ inputs.arch }} \
            --allow-untagged true \
            --allow-uncommitted true \
            ${{ inputs.fast_build && '--repo true --remote-derivative-packages true' || '' }}

      - name: Build Whonix workstation
        if: inputs.distro == 'whonix' && inputs.target != 'iso'
        run: |
          cd derivative-maker
          ./derivative-maker \
            --flavor whonix-workstation-${{ inputs.flavor }} \
            --target ${{ inputs.target }} \
            --type vm \
            --arch ${{ inputs.arch }} \
            --allow-untagged true \
            --allow-uncommitted true \
            ${{ inputs.fast_build && '--repo true --remote-derivative-packages true' || '' }}

      - name: Build Kicksecure
        if: inputs.distro == 'kicksecure'
        run: |
          cd derivative-maker
          ./derivative-maker \
            --flavor kicksecure-${{ inputs.flavor }} \
            --target ${{ inputs.target }} \
            --type ${{ inputs.target == 'iso' && 'host' || 'vm' }} \
            --arch ${{ inputs.arch }} \
            --allow-untagged true \
            --allow-uncommitted true \
            ${{ inputs.fast_build && '--repo true --remote-derivative-packages true' || '' }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.distro }}-${{ inputs.flavor }}-${{ inputs.target }}-${{ inputs.arch }}
          path: ~/derivative-binary/
          retention-days: 30
