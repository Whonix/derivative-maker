---
name: Build (reusable)

on:
  workflow_call:
    inputs:
      distro:
        required: true
        type: string
      flavor:
        required: true
        type: string
      target:
        required: true
        type: string
      arch:
        required: true
        type: string
      runner:
        required: true
        type: string
      fast_build:
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ${{ inputs.runner }}
    container:
      image: debian:trixie
      options: --privileged
    env:
      DEBIAN_FRONTEND: noninteractive
      CI: true
      make_use_debsign: false
    steps:

      - name: Install prerequisites
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            git \
            sudo \
            ca-certificates \
            adduser \
            lsb-release \
            sq \
            procps

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          path: derivative-maker
          submodules: recursive

      - name: Patch grml-debootstrap for container compatibility
        run: |
          ## kpartx -d fails in containers because device mapper can't fully
          ## clean up loop devices. The image is already written at this point
          ## so the failure is harmless. Add || true to tolerate it.
          sed -i 's#kpartx -d "${ORIG_TARGET}" >/dev/null$#kpartx -d "${ORIG_TARGET}" >/dev/null || true#' \
            derivative-maker/grml-debootstrap/grml-debootstrap
          sed -i 's#kpartx -d "/dev/${LOOP_DISK}" >/dev/null$#kpartx -d "/dev/${LOOP_DISK}" >/dev/null || true#' \
            derivative-maker/grml-debootstrap/grml-debootstrap

      - name: Create build user
        run: |
          useradd -m user
          echo 'user ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/user
          chown -R user:user derivative-maker

      - name: Stub out systemctl
        run: |
          ## systemd is not running in the container. Create a stub that
          ## silently succeeds so derivative-maker's approx setup doesn't fail.
          printf '#!/bin/sh\nexit 0\n' > /usr/local/bin/systemctl
          chmod +x /usr/local/bin/systemctl

      - name: Build Whonix gateway
        if: inputs.distro == 'whonix' && inputs.target != 'iso'
        env:
          dist_build_sources_list_primary: /__w/derivative-maker/derivative-maker/derivative-maker/build_sources/debian_stable_current_clearnet_no_approx.sources
        run: |
          cd derivative-maker
          su user -c './derivative-maker \
            --flavor whonix-gateway-${{ inputs.flavor }} \
            --target ${{ inputs.target }} \
            --type vm \
            --arch ${{ inputs.arch }} \
            --allow-untagged true \
            --allow-uncommitted true \
            ${{ inputs.fast_build && '--repo true --remote-derivative-packages true' || '' }}'

      - name: Build Whonix workstation
        if: inputs.distro == 'whonix' && inputs.target != 'iso'
        env:
          dist_build_sources_list_primary: /__w/derivative-maker/derivative-maker/derivative-maker/build_sources/debian_stable_current_clearnet_no_approx.sources
        run: |
          cd derivative-maker
          su user -c './derivative-maker \
            --flavor whonix-workstation-${{ inputs.flavor }} \
            --target ${{ inputs.target }} \
            --type vm \
            --arch ${{ inputs.arch }} \
            --allow-untagged true \
            --allow-uncommitted true \
            ${{ inputs.fast_build && '--repo true --remote-derivative-packages true' || '' }}'

      - name: Build Kicksecure
        if: inputs.distro == 'kicksecure'
        env:
          dist_build_sources_list_primary: /__w/derivative-maker/derivative-maker/derivative-maker/build_sources/debian_stable_current_clearnet_no_approx.sources
        run: |
          cd derivative-maker
          su user -c './derivative-maker \
            --flavor kicksecure-${{ inputs.flavor }} \
            --target ${{ inputs.target }} \
            --type ${{ inputs.target == 'iso' && 'host' || 'vm' }} \
            --arch ${{ inputs.arch }} \
            --allow-untagged true \
            --allow-uncommitted true \
            ${{ inputs.fast_build && '--repo true --remote-derivative-packages true' || '' }}'

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.distro }}-${{ inputs.flavor }}-${{ inputs.target }}-${{ inputs.arch }}
          path: ~/derivative-binary/
          retention-days: 30
