---
name: Build (reusable)

on:
  workflow_call:
    inputs:
      distro:
        required: true
        type: string
      flavor:
        required: true
        type: string
      target:
        required: true
        type: string
      arch:
        required: true
        type: string
      runner:
        required: true
        type: string
      fast_build:
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ${{ inputs.runner }}
    env:
      DEBIAN_FRONTEND: noninteractive
      CI: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          path: derivative-maker
          submodules: recursive

      - name: Install build prerequisites
        run: |
          sudo add-apt-repository -y universe
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            sq \
            safe-rm \
            approx \
            debian-archive-keyring \
            fasttrack-archive-keyring \
            gpg-sq

      - name: Build Whonix gateway
        if: inputs.distro == 'whonix' && inputs.target != 'iso'
        run: |
          cd derivative-maker
          ./derivative-maker \
            --flavor whonix-gateway-${{ inputs.flavor }} \
            --target ${{ inputs.target }} \
            --type vm \
            --arch ${{ inputs.arch }} \
            --allow-untagged true \
            --allow-uncommitted true \
            ${{ inputs.fast_build && '--repo true --remote-derivative-packages true' || '' }}

      - name: Build Whonix workstation
        if: inputs.distro == 'whonix' && inputs.target != 'iso'
        run: |
          cd derivative-maker
          ./derivative-maker \
            --flavor whonix-workstation-${{ inputs.flavor }} \
            --target ${{ inputs.target }} \
            --type vm \
            --arch ${{ inputs.arch }} \
            --allow-untagged true \
            --allow-uncommitted true \
            ${{ inputs.fast_build && '--repo true --remote-derivative-packages true' || '' }}

      - name: Build Kicksecure
        if: inputs.distro == 'kicksecure'
        run: |
          cd derivative-maker
          ./derivative-maker \
            --flavor kicksecure-${{ inputs.flavor }} \
            --target ${{ inputs.target }} \
            --type ${{ inputs.target == 'iso' && 'host' || 'vm' }} \
            --arch ${{ inputs.arch }} \
            --allow-untagged true \
            --allow-uncommitted true \
            ${{ inputs.fast_build && '--repo true --remote-derivative-packages true' || '' }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.distro }}-${{ inputs.flavor }}-${{ inputs.target }}-${{ inputs.arch }}
          path: ~/derivative-binary/
          retention-days: 30
