## OpenSSF Scorecard - weekly posture audit. Publishes findings as
## SARIF in the repo's Security tab. Trust footprint: OpenSSF /
## Linux Foundation.
##
## Job body lives in the reusable workflow at
## developer-meta-files/.github/workflows/scorecard.yml so all repos
## in the org share one definition. This file is the per-repo wrapper:
## it owns the trigger schedule (must be at the caller, GitHub Actions
## does not allow schedule under workflow_call) and the cron slot
## (each repo picks a slot that doesn't collide with the others).

name: Scorecard

on:
  ## Branch-protection setting changes are themselves a check input.
  branch_protection_rule:
  schedule:
    - cron: '0 4 * * 0'
  ## Branch-push trigger intentionally omitted: a tag-bearing commit
  ## landing on master would otherwise fire this workflow alongside
  ## the tag-triggered Dry-run / Lint / builder jobs. The weekly
  ## schedule covers ongoing posture drift; per-commit posture
  ## changes (branch-protection rules) are caught by the
  ## branch_protection_rule trigger above.

permissions:
  contents: read

jobs:
  scorecard:
    ## TESTING: hardcoded to the org-ai-assisted fork while we
    ## validate the cross-repo workflow_call wiring end-to-end.
    ## Will switch to 'Kicksecure/' once verified. GitHub Actions
    ## does NOT allow '${{ github.* }}' in jobs.<id>.uses (only
    ## inputs/vars/needs/matrix), so a dynamic-org expression is
    ## not an option.
    uses: org-ai-assisted/developer-meta-files/.github/workflows/scorecard.yml@master
    permissions:
      security-events: write
      contents: read
      actions: read
