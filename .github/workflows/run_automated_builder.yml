---
name: Run automated builder

on:
  push:
    branches:
      - github-native-automated-builder # TODO: delete this line after merge
      - 'ci-*'
  workflow_dispatch:
    inputs:
      build_group:
        description: "Which jobs to run"
        type: choice
        default: all
        options:
          - all
          - whonix-all
          - kicksecure-all
          - vbox-all
          - raw-all
          - iso-all
          - custom
      distro:
        description: "Distro filter (custom only)"
        type: choice
        default: all
        options:
          - all
          - whonix
          - kicksecure
      flavor:
        description: "Flavor filter (custom only)"
        type: choice
        default: all
        options:
          - all
          - lxqt
          - cli
      target:
        description: "Target filter (custom only)"
        type: choice
        default: all
        options:
          - all
          - virtualbox
          - raw
          - iso
      arch:
        description: "Architecture filter (custom only)"
        type: choice
        default: all
        options:
          - all
          - amd64
          - arm64
      fast_build:
        description: "Fast build: use remote repo and pre-built packages instead of building from source"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:

  resolve-jobs:
    runs-on: ubuntu-24.04
    outputs:
      jobs: ${{ steps.filter.outputs.jobs }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        run: >-
          ./.github/scripts/resolve-jobs.sh
          "${{ inputs.build_group }}"
          "${{ inputs.distro }}"
          "${{ inputs.flavor }}"
          "${{ inputs.target }}"
          "${{ inputs.arch }}"

  ## VirtualBox — amd64 only ################################################

  whonix-lxqt-vbox-amd64:
    needs: resolve-jobs
    if: contains(fromJSON(needs.resolve-jobs.outputs.jobs), 'whonix-lxqt-virtualbox-amd64')
    uses: ./.github/workflows/build.yml
    with:
      distro: whonix
      flavor: lxqt
      target: virtualbox
      arch: amd64
      runner: ubuntu-24.04
      fast_build: ${{ inputs.fast_build || false }}

  whonix-cli-vbox-amd64:
    needs: resolve-jobs
    if: contains(fromJSON(needs.resolve-jobs.outputs.jobs), 'whonix-cli-virtualbox-amd64')
    uses: ./.github/workflows/build.yml
    with:
      distro: whonix
      flavor: cli
      target: virtualbox
      arch: amd64
      runner: ubuntu-24.04
      fast_build: ${{ inputs.fast_build || false }}

  kicksecure-lxqt-vbox-amd64:
    needs: resolve-jobs
    if: contains(fromJSON(needs.resolve-jobs.outputs.jobs), 'kicksecure-lxqt-virtualbox-amd64')
    uses: ./.github/workflows/build.yml
    with:
      distro: kicksecure
      flavor: lxqt
      target: virtualbox
      arch: amd64
      runner: ubuntu-24.04
      fast_build: ${{ inputs.fast_build || false }}

  kicksecure-cli-vbox-amd64:
    needs: resolve-jobs
    if: contains(fromJSON(needs.resolve-jobs.outputs.jobs), 'kicksecure-cli-virtualbox-amd64')
    uses: ./.github/workflows/build.yml
    with:
      distro: kicksecure
      flavor: cli
      target: virtualbox
      arch: amd64
      runner: ubuntu-24.04
      fast_build: ${{ inputs.fast_build || false }}

  ## Raw — amd64 #############################################################

  whonix-lxqt-raw-amd64:
    needs: resolve-jobs
    if: contains(fromJSON(needs.resolve-jobs.outputs.jobs), 'whonix-lxqt-raw-amd64')
    uses: ./.github/workflows/build.yml
    with:
      distro: whonix
      flavor: lxqt
      target: raw
      arch: amd64
      runner: ubuntu-24.04
      fast_build: ${{ inputs.fast_build || false }}

  whonix-cli-raw-amd64:
    needs: resolve-jobs
    if: contains(fromJSON(needs.resolve-jobs.outputs.jobs), 'whonix-cli-raw-amd64')
    uses: ./.github/workflows/build.yml
    with:
      distro: whonix
      flavor: cli
      target: raw
      arch: amd64
      runner: ubuntu-24.04
      fast_build: ${{ inputs.fast_build || false }}

  kicksecure-lxqt-raw-amd64:
    needs: resolve-jobs
    if: contains(fromJSON(needs.resolve-jobs.outputs.jobs), 'kicksecure-lxqt-raw-amd64')
    uses: ./.github/workflows/build.yml
    with:
      distro: kicksecure
      flavor: lxqt
      target: raw
      arch: amd64
      runner: ubuntu-24.04
      fast_build: ${{ inputs.fast_build || false }}

  kicksecure-cli-raw-amd64:
    needs: resolve-jobs
    if: contains(fromJSON(needs.resolve-jobs.outputs.jobs), 'kicksecure-cli-raw-amd64')
    uses: ./.github/workflows/build.yml
    with:
      distro: kicksecure
      flavor: cli
      target: raw
