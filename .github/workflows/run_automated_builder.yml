      fast_build: ${{ inputs.fast_build || false }}

  kicksecure-cli-iso-arm64:
    needs: resolve-jobs
    if: contains(fromJSON(needs.resolve-jobs.outputs.jobs), 'kicksecure-cli-iso-arm64')
