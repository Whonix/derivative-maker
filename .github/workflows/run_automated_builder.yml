    if: contains(fromJSON(needs.resolve-jobs.outputs.jobs), 'kicksecure-lxqt-iso-amd64')
    uses: ./.github/workflows/build.yml
    with:
      distro: kicksecure
      flavor: lxqt
      target: iso
      arch: amd64
      runner: ubuntu-24.04
      fast_build: ${{ inputs.fast_build || false }}

  kicksecure-cli-iso-amd64:
    needs: resolve-jobs
    if: contains(fromJSON(needs.resolve-jobs.outputs.jobs), 'kicksecure-cli-iso-amd64')
    uses: ./.github/workflows/build.yml
    with:
      distro: kicksecure
      flavor: cli
      target: iso
      arch: amd64
      runner: ubuntu-24.04
      fast_build: ${{ inputs.fast_build || false }}

  kicksecure-lxqt-iso-arm64:
    needs: resolve-jobs
    if: contains(fromJSON(needs.resolve-jobs.outputs.jobs), 'kicksecure-lxqt-iso-arm64')
    uses: ./.github/workflows/build.yml
    with:
      distro: kicksecure
      flavor: lxqt
      target: iso
      arch: arm64
