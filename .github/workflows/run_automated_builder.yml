      || inputs.build_group == 'vbox-all'
      || inputs.build_group == 'kicksecure-all'
      || (inputs.build_group == 'custom'
          && (inputs.distro == 'all' || inputs.distro == 'kicksecure')
          && (inputs.flavor == 'all' || inputs.flavor == 'lxqt')
          && (inputs.target == 'all' || inputs.target == 'virtualbox')
          && (inputs.arch == 'all' || inputs.arch == 'amd64'))
    uses: ./.github/workflows/build.yml
    with:
      distro: kicksecure
      flavor: lxqt
      target: virtualbox
      arch: amd64
      runner: ubuntu-24.04
      use_remote_repo: ${{ inputs.use_remote_repo }}

  kicksecure-cli-vbox-amd64:
