    if: contains(fromJSON(needs.resolve-jobs.outputs.jobs), 'whonix-lxqt-raw-arm64')
    uses: ./.github/workflows/build.yml
    with:
      distro: whonix
      flavor: lxqt
      target: raw
      arch: arm64
      runner: ubuntu-24.04-arm
      fast_build: ${{ inputs.fast_build || false }}

  whonix-cli-raw-arm64:
    needs: resolve-jobs
    if: contains(fromJSON(needs.resolve-jobs.outputs.jobs), 'whonix-cli-raw-arm64')
    uses: ./.github/workflows/build.yml
    with:
      distro: whonix
      flavor: cli
      target: raw
      arch: arm64
      runner: ubuntu-24.04-arm
      fast_build: ${{ inputs.fast_build || false }}

  kicksecure-lxqt-raw-arm64:
    needs: resolve-jobs
    if: contains(fromJSON(needs.resolve-jobs.outputs.jobs), 'kicksecure-lxqt-raw-arm64')
    uses: ./.github/workflows/build.yml
    with:
      distro: kicksecure
      flavor: lxqt
      target: raw
      arch: arm64
      runner: ubuntu-24.04-arm
      fast_build: ${{ inputs.fast_build || false }}

  kicksecure-cli-raw-arm64:
    needs: resolve-jobs
    if: contains(fromJSON(needs.resolve-jobs.outputs.jobs), 'kicksecure-cli-raw-arm64')
    uses: ./.github/workflows/build.yml
    with:
      distro: kicksecure
      flavor: cli
