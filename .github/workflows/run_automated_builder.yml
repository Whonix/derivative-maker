---
name: Run automated builder

on:
  workflow_dispatch:
    inputs:
      build_group:
        description: "Which jobs to run"
        type: choice
        default: all
        options:
          - all
          - whonix-all
          - kicksecure-all
          - vbox-all
          - raw-all
          - iso-all
          - custom
      distro:
        description: "Distro filter (custom only)"
        type: choice
        default: all
        options:
          - all
          - whonix
          - kicksecure
      flavor:
        description: "Flavor filter (custom only)"
        type: choice
        default: all
        options:
          - all
          - lxqt
          - cli
      target:
        description: "Target filter (custom only)"
        type: choice
        default: all
        options:
          - all
          - virtualbox
          - raw
          - iso
      arch:
        description: "Architecture filter (custom only)"
        type: choice
        default: all
        options:
          - all
          - amd64
          - arm64
      use_remote_repo:
        description: "Pass --repo true to derivative-maker (fast build using remote packages)"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:

  ## VirtualBox — amd64 only ################################################

  whonix-lxqt-vbox-amd64:
    if: >-
      inputs.build_group == 'all'
      || inputs.build_group == 'vbox-all'
      || inputs.build_group == 'whonix-all'
      || (inputs.build_group == 'custom'
          && (inputs.distro == 'all' || inputs.distro == 'whonix')
          && (inputs.flavor == 'all' || inputs.flavor == 'lxqt')
          && (inputs.target == 'all' || inputs.target == 'virtualbox')
          && (inputs.arch == 'all' || inputs.arch == 'amd64'))
    uses: ./.github/workflows/build.yml
    with:
      distro: whonix
      flavor: lxqt
      target: virtualbox
      arch: amd64
      runner: ubuntu-24.04
      use_remote_repo: ${{ inputs.use_remote_repo }}

  whonix-cli-vbox-amd64:
    if: >-
      inputs.build_group == 'all'
      || inputs.build_group == 'vbox-all'
      || inputs.build_group == 'whonix-all'
      || (inputs.build_group == 'custom'
          && (inputs.distro == 'all' || inputs.distro == 'whonix')
          && (inputs.flavor == 'all' || inputs.flavor == 'cli')
          && (inputs.target == 'all' || inputs.target == 'virtualbox')
          && (inputs.arch == 'all' || inputs.arch == 'amd64'))
    uses: ./.github/workflows/build.yml
    with:
      distro: whonix
      flavor: cli
