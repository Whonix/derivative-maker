---
## Sidebar UI ordering: GitHub sorts the Actions tab alphabetically
## by 'name:'. The '00 ' prefix forces this workflow to the top of
## the list because it is the canonical release pipeline; operators
## should see its status first.
name: 00 Run automated builder

on:
  pull_request:
    branches: [master]
  ## Branch-push triggers intentionally omitted: a tag-bearing commit
  ## landing on master would otherwise fire this workflow twice. Tag
  ## pushes are the canonical release trigger.
  push:
    tags:
      - '*'

## Upstream-only gate. The literal "Whonix/derivative-maker" in the
## job-level `if:` on the `build:` job below prevents forks (and the
## org-ai-assisted mirror) from running this workflow's upstream-only
## paths - the upstream-only secret(s) referenced below (vault
## password / Coverity token / GHORG_AUDIT_TOKEN) are only set on the
## canonical repo. A fork would either see those secrets as empty and
## fail mid-flight, or - worse - run the heavy ops with its own
## arbitrary-named secret.
##
## The canonical owner/repo is inlined in the `if:` rather than
## hoisted to a workflow-level `env:` constant because GitHub Actions
## does not expose the `env` context in job-level `if:` expressions
## (only `github`, `inputs`, `needs`, and `vars` are available there).

## See agents/github-actions-security.md for the standard
## permissions / persist-credentials / fork-PR / SHA-pin patterns.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  ## Dry-run smoke must pass before the heavy automated builder
  ## kicks off. Calls dry-run.yml as a reusable workflow
  ## (on: workflow_call) so dry-run + build run as ONE Actions UI
  ## record - one workflow_run with two job nodes - rather than two
  ## independent workflows whose success states could diverge.
  ## See agents/github-actions-security.md (workflow_call section)
  ## for why we prefer 'uses: ./...' over an event-driven
  ## workflow_run trigger here.
  dry-run:
    uses: ./.github/workflows/dry-run.yml
    ## The reusable workflow only needs contents: read. Pass it
    ## explicitly so a future tightening of the parent's
    ## workflow-level permissions block does not silently strip the
    ## permission the called workflow expects.
    permissions:
      contents: read

  build:
    needs: dry-run
    ## Upstream-only: the Ansible vault used by the build is only a
    ## repo secret on the canonical upstream. Skip on every other
    ## repo so forks don't fail at vault decrypt.
    if: github.repository == 'Whonix/derivative-maker'
    runs-on: ubuntu-latest
    env:
      ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
      GIT_REPO: ${{ github.repository }}
      REF_NAME: ${{ github.ref_name }}
      REF_TYPE: ${{ github.ref_type }}
      GITHUB_EVENT_NAME: ${{ github.event_name }}
    steps:
      - name: Checkout repository (with submodules)
        ## submodules: recursive so help-steps/pre's xtrace.bsh and
        ## the rest of packages/kicksecure/helper-scripts/ are on
        ## disk; fetch-depth: 0 so the helper-scripts submodule's
        ## pinned SHA is reachable.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          submodules: recursive
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: 3.13

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Run automated builder
        run: |
          ./automated_builder/scripts/run_automated_builder.sh $ANSIBLE_VAULT_PASSWORD

      - name: Handle artifacts
        if: always()
        run: |
          ./automated_builder/scripts/handle_artifacts.sh $ANSIBLE_VAULT_PASSWORD

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: logs
          path: ./automated_builder/logs/

      - name: Teardown build
        if: always()
        run: |
          ./automated_builder/scripts/teardown_build.sh $ANSIBLE_VAULT_PASSWORD
