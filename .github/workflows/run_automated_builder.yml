---
name: Run automated builder

on:
  workflow_dispatch:
    inputs:
      build_group:
        description: "Which jobs to run"
        type: choice
        default: all
        options:
          - all
          - whonix-all
          - kicksecure-all
          - vbox-all
          - raw-all
          - iso-all
          - custom
      distro:
        description: "Distro filter (custom only)"
        type: choice
        default: all
        options:
          - all
          - whonix
          - kicksecure
      flavor:
        description: "Flavor filter (custom only)"
        type: choice
        default: all
        options:
          - all
          - lxqt
          - cli
      target:
        description: "Target filter (custom only)"
        type: choice
        default: all
        options:
          - all
          - virtualbox
          - raw
          - iso
      arch:
        description: "Architecture filter (custom only)"
        type: choice
        default: all
        options:
          - all
          - amd64
          - arm64
      use_remote_repo:
        description: "Pass --repo true to derivative-maker (fast build using remote packages)"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  vbox-amd64:
    uses: ./.github/workflows/build-vbox-amd64.yml
    with:
      build_group: ${{ inputs.build_group }}
      distro: ${{ inputs.distro }}
      flavor: ${{ inputs.flavor }}
      target: ${{ inputs.target }}
      arch: ${{ inputs.arch }}
      use_remote_repo: ${{ inputs.use_remote_repo }}

  raw-amd64:
    uses: ./.github/workflows/build-raw-amd64.yml
    with:
      build_group: ${{ inputs.build_group }}
      distro: ${{ inputs.distro }}
      flavor: ${{ inputs.flavor }}
      target: ${{ inputs.target }}
      arch: ${{ inputs.arch }}
      use_remote_repo: ${{ inputs.use_remote_repo }}

  raw-arm64:
    uses: ./.github/workflows/build-raw-arm64.yml
    with:
      build_group: ${{ inputs.build_group }}
      distro: ${{ inputs.distro }}
      flavor: ${{ inputs.flavor }}
      target: ${{ inputs.target }}
      arch: ${{ inputs.arch }}
      use_remote_repo: ${{ inputs.use_remote_repo }}

  iso-amd64:
    uses: ./.github/workflows/build-iso-amd64.yml
    with:
      build_group: ${{ inputs.build_group }}
      distro: ${{ inputs.distro }}
      flavor: ${{ inputs.flavor }}
      target: ${{ inputs.target }}
      arch: ${{ inputs.arch }}
      use_remote_repo: ${{ inputs.use_remote_repo }}

  iso-arm64:
    uses: ./.github/workflows/build-iso-arm64.yml
    with:
      build_group: ${{ inputs.build_group }}
      distro: ${{ inputs.distro }}
      flavor: ${{ inputs.flavor }}
      target: ${{ inputs.target }}
      arch: ${{ inputs.arch }}
      use_remote_repo: ${{ inputs.use_remote_repo }}
