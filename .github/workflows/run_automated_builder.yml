---
name: Run automated builder

on:
  pull_request:
    branches: [master]
  push:
    branches:
      #- master
      - 'ci*'
    tags:
      - '*'

## Defensive minimum-permissions block. Documents the GITHUB_TOKEN
## scope this workflow needs, isolating it from the org-level "default
## workflow permissions" setting (which dm-github-policy pins to read).
##
## actions: write is intentionally NOT granted. actions/upload-artifact@v7
## was tested empirically (see commit history for the throwaway
## test/artifact-permissions branch and run 24967508066) and works
## correctly with contents: read alone - the artifact backend uses the
## workflow run's own identity, not the GITHUB_TOKEN's permission scope,
## so no actions: write is required.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
      GIT_REPO: ${{ github.repository }}
      REF_NAME: ${{ github.ref_name }}
      REF_TYPE: ${{ github.ref_type }}
      GITHUB_EVENT_NAME: ${{ github.event_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: 3.13

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Run automated builder
        run: |
          ./automated_builder/scripts/run_automated_builder.sh $ANSIBLE_VAULT_PASSWORD

      - name: Handle artifacts
        if: always()
        run: |
          ./automated_builder/scripts/handle_artifacts.sh $ANSIBLE_VAULT_PASSWORD

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: logs
          path: ./automated_builder/logs/

      - name: Teardown build
        if: always()
        run: |
          ./automated_builder/scripts/teardown_build.sh $ANSIBLE_VAULT_PASSWORD
