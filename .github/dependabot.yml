## Hand-maintained. Dockerfile lives at docker/Dockerfile.
## See developer-meta-files/agents/github-actions-consumer-templates.md
## "Per-repo manual dependabot.yml".

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    commit-message:
      prefix: "ci(deps)"
      include: scope
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "docker"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    commit-message:
      prefix: "ci(deps)"
      include: scope
    groups:
      docker:
        patterns:
          - "*"
