---
## Dependabot configuration. Bumps the SHA pins on GitHub Actions and
## the digest pins on Docker base images that the workflows reference.
## All actions and image: lines are already SHA-pinned; Dependabot
## updates them to whatever the upstream tags currently resolve to.
##
## Note: Dependabot does NOT auto-bump container digests inside
## workflow 'image:' lines, only Dockerfile 'FROM' lines in well-known
## locations. See agents/github-actions-security.md for the manual
## re-pin procedure for the matrix images.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    commit-message:
      prefix: "ci(deps)"
      include: scope
    ## Bundle all GitHub Actions SHA bumps into a single PR per
    ## weekly cycle. Without this, dependabot opens one PR per action
    ## per cycle and the 'open-pull-requests-limit: 1' silently drops
    ## the rest. With grouping, a single PR carries every action
    ## update at once, no drops.
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    commit-message:
      prefix: "ci(deps)"
      include: scope
    groups:
      docker:
        patterns:
          - "*"
