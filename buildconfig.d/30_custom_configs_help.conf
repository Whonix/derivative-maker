## You can drop your custom build config files in:
## ${HOMEVAR}/buildconfig.d
## Files need to have the '.conf' file extension.
##
## For example with HOMEVAR=/home/user, drop them in
## /home/user/buildconfig.d/. Easier than dropping in
## /home/user/Whonix/buildconfig.d, because you do not have to
## commit them.
