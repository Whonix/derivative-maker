## Variables for key handling and verification

## 'sq-git'
## https://sequoia-pgp.gitlab.io/sequoia-git/
## https://sequoia-pgp.gitlab.io/sequoia-git/user-manual/
## https://sequoia-pgp.gitlab.io/sequoia-git/man/sq-git.1.html
## https://fosdem.org/2026/schedule/event/KFSUCW-sequoia-git/

## 'sq-git log' root of trust ('--trust-root')
## Default to:
## - for user custom builds: HEAD
## - redistributable builds: See 'help-steps/variables'.
##   (when using setting variable 'dist_build_redistributable=true')
#sq_git_trust_root="HEAD"

## path to 'sq-git log' policy file ('--policy-file')
## https://sequoia-pgp.gitlab.io/sequoia-git/specification/#name-policy
##
## help-steps/variables walks ${dist_build_config_dirs} for
## openpgp-policy.toml; the highest-precedence (= last) entry that
## contains the file wins. Defaults map to:
##
##   Priority  | Location
## 1 (lowest)  | ${source_code_folder_dist}/buildconfig.d/openpgp-policy.toml
## 2 (higher)  | /etc/buildconfig-dist.d/openpgp-policy.toml
## 3 (highest) | ../buildconfig.d/openpgp-policy.toml
##
## Override here only to point at a non-buildconfig.d location.
#sq_git_policy_file=/some/other/openpgp-policy.toml

#set -x
set -o errexit
set -o nounset
set -o pipefail
set -o errtrace
